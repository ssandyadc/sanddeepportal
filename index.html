    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is GeM Portal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GeM (Government e-Marketplace) is the official online platform of the Government of India for procurement of goods and services. Sellers can register and sell directly to all government departments, ministries, and PSUs."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need any prior business experience to register on GeM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No! GeM is open to individuals, sole proprietors, MSMEs, companies, and even housewives with basic business registration. We help complete beginners get started from scratch."
          }
        },
        {
          "@type": "Question",
          "name": "How long does GeM registration take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "With our support, GeM seller registration is completed within 3-5 working days, and the full setup including catalog and first bid is done within 30 days."
          }
        },
        {
          "@type": "Question",
          "name": "What documents do I need for GeM registration?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Basic documents include Aadhaar, PAN, Bank details, and business registration (UDYAM/GST). We guide you on every document and help prepare them correctly."
          }
        },
        {
          "@type": "Question",
          "name": "Can I sell services on GeM, not just products?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! GeM has a large services section. You can offer IT services, manpower, consulting, printing, transport, and many more categories. We activate the right service categories for you."
          }
        }
      ]
    }
